name: ci
on:
  push:
    branches: [main]
    paths-ignore:
      - "ops/**"        # loop digest/ledger commits carry no engine code
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck --severity=warning bin/*.sh install.sh templates/labels.sh selfhost/*.sh tests/*.sh
      - name: prompt-lint
        run: bash tests/prompt-lint.sh
      - name: tests
        run: bash tests/run.sh
